name: prism
description: "PRISM — Perceptual Recognition Intelligence for Sound Meaning (Phase 0 skeleton)"
publish_to: 'none'
version: 0.0.1+1

environment:
  sdk: ^3.11.3
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  flutter_rust_bridge: ^2.12.0

  # Phase 1 on-device LLM stack.
  flutter_gemma: ^0.16.1

  permission_handler: ^11.3.1
  path_provider: ^2.1.4
  flutter_local_notifications: ^17.2.3
  rxdart: ^0.28.0

  # Phase 2 enrollment persistence.
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # In-app integration tests driven by the Flutter engine on a real device or emulator.
  integration_test:
    sdk: flutter

  # OS-level UI automation: grants system permissions, taps system notifications,
  # locks/unlocks the device, swaps apps. Required for any test that crosses
  # the Flutter/Android boundary (mic + notification dialogs, foreground service).
  patrol: ^3.13.0

  # Coverage tooling.
  coverage: ^1.9.2

flutter:
  uses-material-design: true
  assets:
    - assets/anchor_seeds.json
